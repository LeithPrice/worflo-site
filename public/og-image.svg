<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a1628"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Glow blob -->
  <ellipse cx="600" cy="315" rx="380" ry="220" fill="#0062cc" fill-opacity="0.18"/>

  <!-- Icon -->
  <rect x="76" y="220" width="72" height="72" rx="16" fill="#0062cc"/>
  <polygon points="119,228 100,268 112,268 108,284 128,248 116,248" fill="#ffffff"/>

  <!-- Worflo wordmark -->
  <text x="168" y="275" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="52" font-weight="700" fill="#ffffff">Worflo</text>

  <!-- Tagline -->
  <text x="76" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="400" fill="#93c5fd">Debug, version-control, and monitor your HubSpot workflows.</text>

  <!-- Feature pills -->
  <rect x="76" y="390" width="190" height="40" rx="20" fill="#0062cc" fill-opacity="0.35" stroke="#0062cc" stroke-opacity="0.6" stroke-width="1"/>
  <text x="171" y="416" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#93c5fd" text-anchor="middle">Execution Traces</text>

  <rect x="282" y="390" width="170" height="40" rx="20" fill="#0062cc" fill-opacity="0.35" stroke="#0062cc" stroke-opacity="0.6" stroke-width="1"/>
  <text x="367" y="416" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#93c5fd" text-anchor="middle">Version History</text>

  <rect x="468" y="390" width="150" height="40" rx="20" fill="#0062cc" fill-opacity="0.35" stroke="#0062cc" stroke-opacity="0.6" stroke-width="1"/>
  <text x="543" y="416" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#93c5fd" text-anchor="middle">AI Explanations</text>

  <rect x="634" y="390" width="130" height="40" rx="20" fill="#0062cc" fill-opacity="0.35" stroke="#0062cc" stroke-opacity="0.6" stroke-width="1"/>
  <text x="699" y="416" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#93c5fd" text-anchor="middle">Rollback</text>

  <!-- URL -->
  <text x="76" y="560" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="400" fill="#4b7ab8">worflo.io</text>
</svg>
